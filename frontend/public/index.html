<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ── SEO & Social ─────────────────────────────── -->
    <title>UDTech Dev Platform</title>
    <meta name="description"
      content="UDTech Dev Platform — free learning resources, developer tools, and a vibrant community to accelerate your coding journey." />
    <meta name="keywords"
      content="UDTech, developer platform, learning resources, React, Node.js, web development" />
    <meta name="author" content="UDTech India" />

    <!-- Open Graph -->
    <meta property="og:title"       content="UDTech Dev Platform" />
    <meta property="og:description" content="Free resources, tools, and community for developers." />
    <meta property="og:type"        content="website" />

    <!-- ── Theme color (dark default) ──────────────── -->
    <meta name="theme-color" content="#0a0f1e" />

    <!-- ── Icons & Manifest ─────────────────────────── -->
    <link rel="icon"             href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest"         href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Performance: preconnect to external origins ─ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="dns-prefetch"  href="https://github.com" />
    <link rel="dns-prefetch"  href="https://linkedin.com" />
    <link rel="dns-prefetch"  href="https://twitter.com" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
